server {
    server_name associacoes.nexoracloud.com.br;

    root /var/www/associacoes-nexoracloud;
    index index.html;

    location = /health {
        proxy_pass http://127.0.0.1:3060/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3060/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10m;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        alias /var/www/associacoes-nexoracloud/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/associacoes.nexoracloud.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/associacoes.nexoracloud.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name associacoes.nexoracloud.com.br;
    return 301 https://$host$request_uri;
}
